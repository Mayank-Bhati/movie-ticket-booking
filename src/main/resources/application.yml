spring:
  application:
    name: movie-ticket-booking
  datasource:
    url: jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  jwt:
    # Base64-encoded 256-bit secret. Override in real deployments via APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:c2VjcmV0LWtleS1mb3ItbW92aWUtdGlja2V0LWJvb2tpbmctZGVtby1vbmx5LTEyMzQ1Ng==}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  hold:
    ttl-minutes: ${APP_HOLD_TTL_MINUTES:5}
    sweep-interval-ms: ${APP_HOLD_SWEEP_INTERVAL_MS:30000}
  notification:
    dispatch-interval-ms: ${APP_NOTIFICATION_DISPATCH_INTERVAL_MS:5000}
    reminder-interval-ms: ${APP_NOTIFICATION_REMINDER_INTERVAL_MS:3600000}
    reminder-window-hours: ${APP_NOTIFICATION_REMINDER_WINDOW_HOURS:24}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@moviebooking.com}
    password: ${APP_ADMIN_PASSWORD:admin123}

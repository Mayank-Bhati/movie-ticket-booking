# Zero-setup demo profile: runs against in-memory H2, no MySQL required.
# Start with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=demo
spring:
  datasource:
    url: jdbc:h2:mem:moviedb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

app:
  demo:
    seed-sample-data: true
